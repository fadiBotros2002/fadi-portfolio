<!-- Contact Section Component -->
<section id="contact" class="contact">
    <div class="container">

        <div class="contact-content">
            <div class="contact-info">
                <h3 data-i18n="contact.subtitle">لنتواصل</h3>
                <p class="contact-subtitle-text" data-i18n="contact.subtitleHint">اختر الطريقة المناسبة لك للتواصل</p>
                
                <div class="contact-methods">
                    <div class="contact-card">
                        <div class="contact-icon">
                            <i class="fas fa-envelope"></i>
                        </div>
                        <div class="contact-details">
                            <h4 data-i18n="contact.email">البريد الإلكتروني</h4>
                            <p>fadibotros99@gmail.com</p>
                            <button type="button" class="contact-action" onclick="copyToClipboard('fadibotros99@gmail.com')">
                                <i class="fas fa-copy" aria-hidden="true"></i>
                                <span class="btn-text" data-i18n="contact.copy">نسخ</span>
                            </button>
                        </div>
                    </div>
                    
                    <div class="contact-card">
                        <div class="contact-icon">
                            <i class="fas fa-phone"></i>
                        </div>
                        <div class="contact-details">
                            <h4 data-i18n="contact.phone">الهاتف</h4>
                            <p>+963 938641779</p>
                            <button type="button" class="contact-action" onclick="copyToClipboard('+963 938641779')">
                                <i class="fas fa-copy" aria-hidden="true"></i>
                                <span class="btn-text" data-i18n="contact.copy">نسخ</span>
                            </button>
                        </div>
                    </div>
                    
                    <div class="contact-card">
                        <div class="contact-icon">
                            <i class="fas fa-map-marker-alt"></i>
                        </div>
                        <div class="contact-details">
                            <h4 data-i18n="contact.location">Location</h4>
                            <p data-i18n="contact.locationValue">Damascus, Syria</p>
                            <button type="button" class="contact-action" onclick="openMap()">
                                <i class="fas fa-map" aria-hidden="true"></i>
                                <span class="btn-text" data-i18n="contact.map">الخريطة</span>
                            </button>
                        </div>
                    </div>
                </div>
                
                <div class="contact-social-block">
                    <p class="contact-social-block__heading" data-i18n="contact.socialTitle">روابط مهنية</p>
                    <div class="contact-social-block__grid">
                        <a class="contact-social-block__link contact-social-block__link--linkedin" href="https://linkedin.com/in/fadi-botros-069668276" target="_blank" rel="noopener noreferrer">
                            <span class="contact-social-block__icon" aria-hidden="true"><i class="fab fa-linkedin"></i></span>
                            <span class="contact-social-block__text">
                                <span class="contact-social-block__name" data-i18n="contact.social.linkedin">LinkedIn</span>
                                <span class="contact-social-block__sub">linkedin.com/in/fadi-botros-069668276</span>
                            </span>
                            <i class="fas fa-arrow-up-right-from-square contact-social-block__external" aria-hidden="true"></i>
                        </a>
                        <a class="contact-social-block__link contact-social-block__link--github" href="https://github.com/fadiBotros2002" target="_blank" rel="noopener noreferrer">
                            <span class="contact-social-block__icon" aria-hidden="true"><i class="fab fa-github"></i></span>
                            <span class="contact-social-block__text">

                                <span class="contact-social-block__sub">github.com/fadiBotros2002</span>
                            </span>
                            <i class="fas fa-arrow-up-right-from-square contact-social-block__external" aria-hidden="true"></i>
